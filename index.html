<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quotation — n8n</title>
<style>
  :root{
    --bg:#0B1220; --panel:#121B2E; --panel-2:#0F1830; --border:#213050;
    --text:#E8ECF1; --muted:#8592A6; --accent:#33C6B0; --accent-dim:#1E7B6E;
    --admin:#E3A008; --editor:#33C6B0; --viewer:#5B6B84; --danger:#E5484D;
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
    --sans:'Inter',-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
  
  header{
    border-bottom:1px solid var(--border);
    padding:18px 24px;
    display:flex;align-items:center;gap:20px;flex-wrap:wrap;
    background:var(--panel-2);
  }
  .logo{font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:.5px;}
  .logo span{color:var(--accent);}

  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
  
  input[type=text], select, textarea{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    padding:8px 10px;border-radius:6px;font-family:var(--sans);font-size:13px;
  }
  textarea{resize:vertical;}

  .connbtn{
    background:var(--accent-dim);color:#fff;border:none;padding:8px 14px;
    border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;
  }
  .connbtn:hover{background:var(--accent);}
  .connbtn:disabled{opacity:0.6;cursor:not-allowed;}

  main{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px;max-width:1300px;margin:0 auto;}
  @media(max-width:900px){main{grid-template-columns:1fr;}}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;}
  .panel h2{margin:0 0 16px;font-size:15px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;}

  .prompt-area textarea{
    width:100%; min-height:280px; font-size:14px; line-height:1.5;
  }

  .result-area{
    background:var(--panel-2); min-height:400px; padding:20px; border-radius:8px;
    white-space:pre-wrap; font-size:14px; line-height:1.6;
    border:1px solid var(--border);
  }
  .result-area:empty::before{
    content:"ผลลัพธ์ใบเสนอราคาจะแสดงที่นี่...";
    color:var(--muted);
    font-style:italic;
  }

  .log{
    grid-column:1/-1;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:16px 18px;margin:0 auto 24px;font-family:var(--mono);font-size:12px;
  }
  .log-entry{padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;}
  .log-entry:last-child{border-bottom:none;}
  .log-entry .m{color:var(--accent);font-weight:700;min-width:50px;}
  .log-entry .s-ok{color:var(--accent);}
  .log-entry .s-err{color:var(--danger);}

  button.generate{
    background:var(--accent); color:#04211d; font-weight:700;
    padding:12px 24px; font-size:15px; border:none; border-radius:8px;
    cursor:pointer; margin-top:10px;
  }
  button.generate:disabled{opacity:0.6; cursor:not-allowed;}
</style>
</head>
<body>

<header>
  <div class="logo">AI<span>Quotation</span></div>

  <div class="field">
    <label>n8n Webhook Base URL</label>
    <input type="text" id="baseUrl" placeholder="https://your-n8n.com/webhook" style="min-width:280px;">
  </div>

  <div class="field">
    <label>บทบาท (Role)</label>
    <select id="roleSelect">
      <option value="admin">admin</option>
      <option value="editor">editor</option>
      <option value="viewer" selected>viewer</option>
    </select>
  </div>

  <button class="connbtn" id="connectBtn" type="button">เชื่อมต่อ n8n</button>

  <div class="field" style="margin-left:auto;">
    <label>สถานะ</label>
    <div><span class="status-dot" id="statusDot"></span><span id="statusText">โหมดสาธิต</span> <span id="modeBadge">DEMO</span></div>
  </div>
</header>

<main>
  <!-- ฝั่งซ้าย: Prompt -->
  <section class="panel">
    <h2>คำสั่งให้ AI สร้างใบเสนอราคา</h2>
    <div class="prompt-area">
      <textarea id="promptInput" placeholder="ตัวอย่างคำสั่ง:&#10;สร้างใบเสนอราคาสำหรับลูกค้า บริษัท ABC จำกัด&#10;สินค้า: โต๊ะประชุม 10 ที่นั่ง, เก้าอี้ผู้บริหาร 20 ตัว&#10;ราคารวมไม่เกิน 450,000 บาท&#10;ต้องการส่งภายใน 2 วันนี้"></textarea>
      
      <button class="generate" id="generateBtn">🚀 สร้างใบเสนอราคา</button>
    </div>
  </section>

  <!-- ฝั่งขวา: ผลลัพธ์ -->
  <section class="panel">
    <h2>ผลลัพธ์ใบเสนอราคา</h2>
    <div id="resultArea" class="result-area"></div>
  </section>
</main>

<div class="log">
  <h2>Request Log — คำขอล่าสุด</h2>
  <div id="logBody"><div class="log-entry"><span class="m">—</span><span>ยังไม่มีการเรียก API</span></div></div>
</div>

<script>
// ==================== Variables ====================
let mode = 'demo';
let isProcessing = false;

const els = {
  baseUrl: document.getElementById('baseUrl'),
  roleSelect: document.getElementById('roleSelect'),
  connectBtn: document.getElementById('connectBtn'),
  statusDot: document.getElementById('statusDot'),
  statusText: document.getElementById('statusText'),
  modeBadge: document.getElementById('modeBadge'),
  promptInput: document.getElementById('promptInput'),
  generateBtn: document.getElementById('generateBtn'),
  resultArea: document.getElementById('resultArea'),
  logBody: document.getElementById('logBody')
};

// ==================== Helper ====================
function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function currentRole() { return els.roleSelect.value; }

function logRequest(method, path, role, status, ok) {
  const empty = els.logBody.querySelector('.log-entry span:last-child');
  if (empty && empty.textContent.includes('ยังไม่มีการเรียก')) els.logBody.innerHTML = '';

  const row = document.createElement('div');
  row.className = 'log-entry';
  row.innerHTML = `
    <span class="m">${method}</span>
    <span>${escapeHtml(path)}</span>
    <span>x-role: ${role}</span>
    <span class="${ok ? 's-ok' : 's-err'}">${status}</span>
  `;
  els.logBody.prepend(row);

  while (els.logBody.children.length > 7) els.logBody.removeChild(els.logBody.lastChild);
}

// ==================== Main Function ====================
els.generateBtn.addEventListener('click', async () => {
  const prompt = els.promptInput.value.trim();
  if (!prompt) {
    alert('กรุณาใส่คำสั่งสำหรับ AI');
    return;
  }
  if (isProcessing) return;

  isProcessing = true;
  els.generateBtn.disabled = true;
  els.generateBtn.textContent = 'กำลังสร้างใบเสนอราคา...';
  els.resultArea.textContent = 'กำลังประมวลผล...';

  const payload = { prompt: prompt, type: "quotation" };

  try {
    if (mode === 'demo') {
      // Demo Mode
      logRequest('POST', '/ai/quotation', currentRole(), '200 (จำลอง)', true);
      setTimeout(() => {
        els.resultArea.innerHTML = `<strong>ใบเสนอราคา (ตัวอย่าง)</strong><br><br>
ลูกค้า: บริษัทตัวอย่าง จำกัด<br>
วันที่: ${new Date().toLocaleDateString('th-TH')}<br><br>
รายการสินค้า/บริการ:<br>
• โต๊ะประชุมขนาดใหญ่ 10 ที่นั่ง — 150,000 บาท<br>
• เก้าอี้ผู้บริหาร 20 ตัว — 180,000 บาท<br>
• ระบบไฟฟ้าและสายเคเบิล — 45,000 บาท<br><br>
ยอดรวมทั้งหมด: <strong>375,000 บาท</strong><br>
ส่วนลดพิเศษ: 10% → <strong>337,500 บาท</strong>`;
      }, 1200);
    } else {
      // Live Mode
      const base = els.baseUrl.value.trim().replace(/\/$/, '');
      if (!base) {
        alert('กรุณากรอก n8n Webhook URL');
        return;
      }

      const url = `${base}/ai/quotation`;
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-role': currentRole()
        },
        body: JSON.stringify(payload)
      });

      logRequest('POST', '/ai/quotation', currentRole(), res.status, res.ok);

      if (res.ok) {
        const data = await res.json();
        els.resultArea.textContent = data.result || data.quotation || data.message || JSON.stringify(data, null, 2);
      } else {
        els.resultArea.textContent = `เกิดข้อผิดพลาด: ${res.status} - ไม่มีสิทธิ์หรือ workflow ไม่ทำงาน`;
      }
    }
  } catch (err) {
    logRequest('POST', '/ai/quotation', currentRole(), 'network error', false);
    els.resultArea.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ n8n\n' + err.message;
  } finally {
    isProcessing = false;
    els.generateBtn.disabled = false;
    els.generateBtn.textContent = '🚀 สร้างใบเสนอราคา';
  }
});

// ==================== Connect & Role ====================
els.connectBtn.addEventListener('click', () => {
  const url = els.baseUrl.value.trim();
  if (!url) {
    mode = 'demo';
    els.statusDot.classList.remove('live');
    els.statusText.textContent = 'โหมดสาธิต';
    els.modeBadge.textContent = 'DEMO';
    return;
  }

  mode = 'live';
  els.statusDot.classList.add('live');
  els.statusText.textContent = 'เชื่อมต่อ n8n สำเร็จ';
  els.modeBadge.textContent = 'LIVE';
});

els.roleSelect.addEventListener('change', () => {
  if (mode === 'live') {
    // สามารถเพิ่ม refresh logic ได้ในอนาคต
  }
});

// Initial
els.modeBadge.style.background = '#1E7B6E';
els.modeBadge.style.color = '#fff';
els.modeBadge.style.padding = '2px 8px';
els.modeBadge.style.borderRadius = '4px';
</script>
</body>
</html>
